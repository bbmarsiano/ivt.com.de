services:
  directus:
    image: directus/directus:latest
    container_name: ivt_directus
    ports:
      - '8055:8055'
    env_file:
      - ./directus.env
    environment:
      # Database connection (using host.docker.internal to access host Postgres)
      DB_CLIENT: pg
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: ivt_dev
      DB_USER: dimitarmitrev
      # DB_PASSWORD is loaded from env_file if set
      
      # Directus configuration (KEY, SECRET, ADMIN_EMAIL, ADMIN_PASSWORD loaded from env_file)
      # These variables are provided via env_file: ./directus.env
      # No interpolation needed - env_file injects them directly
      
      # CORS configuration
      CORS_ENABLED: 'true'
      CORS_ORIGIN: 'http://localhost:3000'
      
      # Public URL
      PUBLIC_URL: 'http://localhost:8055'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8055/server/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
